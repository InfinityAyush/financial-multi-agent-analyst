services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend

    container_name: financial-backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./data:/app/data

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend

    container_name: financial-frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

    environment:
      - VITE_API_URL=http://localhost:8000

    restart: unless-stopped